# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Local Development Stack
# LumindAd · Ad Performance Intelligence Platform v1.0
# Author: Elizabeth Díaz Familia · AI Data Scientist · Sustainable Intelligence & BI
#
# Usage:
#   docker-compose up --build          # Start all services
#   docker-compose up frontend backend # Start specific services
#   docker-compose down -v             # Stop and remove volumes
#
# Services:
#   frontend    React 18 + Vite HMR          http://localhost:5173
#   backend     FastAPI                       http://localhost:8000
#   ml          ML Inference (TF+XGBoost)     http://localhost:8001
#   worker      Celery async tasks            —
#   postgres    PostgreSQL 15                 localhost:5432
#   redis       Redis 7.2                     localhost:6379
#   flower      Celery monitor UI             http://localhost:5555
# ══════════════════════════════════════════════════════════════════════════════

name: lumindad

# ─────────────────────────────────────────────────────────────────────────────
# SHARED CONFIGS
# ─────────────────────────────────────────────────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL:   postgresql+asyncpg://lumindad:lumindad_dev@postgres:5432/lumindad
  REDIS_URL:      redis://redis:6379/0
  CELERY_BROKER_URL:   redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  SECRET_KEY:     dev-secret-key-change-in-production
  JWT_SECRET:     dev-jwt-secret-change-in-production
  APP_ENV:        development
  LOG_LEVEL:      debug
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONPATH:     /app
  MODEL_DIR:      /app/ml/models
  TF_CPP_MIN_LOG_LEVEL: "3"
  GREEN_AI_ENABLED: "true"
  ML_SERVICE_URL: http://ml:8001

x-healthcheck-defaults: &hc-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 20s

# ─────────────────────────────────────────────────────────────────────────────
# SERVICES
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 15 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lumindad_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       lumindad
      POSTGRES_USER:     lumindad
      POSTGRES_PASSWORD: lumindad_dev
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "pg_isready", "-U", "lumindad", "-d", "lumindad"]
    networks:
      - lumindad_net

  # ── Redis 7.2 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: lumindad_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - lumindad_net

  # ── Frontend — React 18 + Vite HMR ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
      target: builder            # Dev: use builder stage (not nginx runner)
    container_name: lumindad_frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src                    # Hot reload
      - ./frontend/public:/app/public
      - /app/node_modules                          # Prevent host override
    environment:
      VITE_API_URL:         http://localhost:8000
      VITE_ML_URL:          http://localhost:8001
      VITE_APP_VERSION:     "1.0.0"
      VITE_APP_ENV:         development
      VITE_ENABLE_GREEN_AI: "true"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lumindad_net

  # ── Backend — FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: lumindad_backend
    restart: unless-stopped
    command: ["/entrypoint.sh", "api"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app                     # Live code reload
      - ./ml/models:/app/ml/models:ro              # ML models read-only
      - uploads_data:/app/uploads
    environment:
      <<: *backend-env
      WORKERS: "1"                                 # Single worker for dev
      LOG_LEVEL: debug
      RELOAD: "true"                               # Uvicorn --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      start_period: 30s
    networks:
      - lumindad_net

  # ── ML Inference Service ────────────────────────────────────────────────────
  ml:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.ml
    container_name: lumindad_ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ml/models:/app/models:ro
      - ./ml/data/processed:/app/data/processed:ro
    environment:
      ML_PORT:           "8001"
      DEFAULT_MODEL:     XGBoost
      GREEN_AI_ENABLED:  "true"
      LOG_LEVEL:         info
      TF_CPP_MIN_LOG_LEVEL: "3"
    healthcheck:
      <<: *hc-defaults
      test: ["CMD", "curl", "-fs", "http://localhost:8001/health"]
      start_period: 45s                            # TF model warmup
    networks:
      - lumindad_net

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: lumindad_worker
    restart: unless-stopped
    command: ["/entrypoint.sh", "worker"]
    volumes:
      - ./backend/app:/app/app
      - ./ml/models:/app/ml/models:ro
      - uploads_data:/app/uploads
    environment:
      <<: *backend-env
      CELERY_CONCURRENCY: "2"
      CELERY_LOGLEVEL:    info
      CHUNK_SIZE:         "50000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lumindad_net

  # ── Flower — Celery monitor ─────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: lumindad_flower
    restart: unless-stopped
    command: >
      celery
      --broker=redis://redis:6379/0
      flower
      --port=5555
      --url_prefix=flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lumindad_net

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────────────────────
networks:
  lumindad_net:
    driver: bridge
    name: lumindad_network
