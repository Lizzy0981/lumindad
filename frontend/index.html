    <!-- ═══════════════════════════════════════════════════════
         FONTS — Outfit + DM Mono
         LumindAd.jsx line 17: exact weights replicated here.
         preconnect before href for optimal DNS resolution.
    ══════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Outfit      → primary UI typeface (LumindAd.jsx: 'Outfit', sans-serif)
      DM Mono     → monospace for code/data values
      Weights loaded: 300 (light) · 400 (regular) · 500 (medium) ·
                      600 (semibold) · 700 (bold) · 800 (extrabold) · 900 (black)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ═══════════════════════════════════════════════════════
         SECURITY HEADERS
    ══════════════════════════════════════════════════════════ -->
    <meta http-equiv="X-UA-Compatible"          content="IE=edge" />
    <meta http-equiv="X-Content-Type-Options"   content="nosniff" />
    <!--
      CSP is set at the nginx layer (infrastructure/nginx/nginx.conf).
      upgrade-insecure-requests removed — server runs on HTTP (no SSL yet).
      Re-enable once HTTPS/TLS is configured with a valid certificate.
    -->

    <!-- ═══════════════════════════════════════════════════════
         SPA ROUTING RESTORE — GitHub Pages / static hosting fix
         Works together with public/404.html redirect script.

         When GitHub Pages serves 404.html for a deep route
         (e.g. /dashboard), that page stores the original path in
         sessionStorage and redirects to /.  This inline script
         runs BEFORE React loads and silently restores the URL
         so React Router renders the correct page.

         Without this script: every direct URL or browser refresh
         on a sub-route shows a real 404.
    ══════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('lumindad_redirect');
        if (redirect) {
          sessionStorage.removeItem('lumindad_redirect');
          if (redirect !== location.href) {
            history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>

    <!-- ═══════════════════════════════════════════════════════
         CRITICAL INLINE STYLE
         Sets body background immediately (before CSS loads)
         to prevent flash of white/unstyled content (FOUC).
         LumindAd.jsx line 19: background:#060610
    ══════════════════════════════════════════════════════════ -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #060610;
        color: #e8e8f8;
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        /* overflow:hidden set in globals.css — prevent double scrollbar */
      }
      /* Prevent FOUC flash during font load */
      body { opacity: 0; transition: opacity 0.15s ease; }
      body.fonts-loaded { opacity: 1; }
    </style>
    <script>
      /* Reveal body once fonts are loaded (or after 300ms fallback) */
      document.fonts.ready.then(function () {
        document.body.classList.add('fonts-loaded');
      });
      setTimeout(function () {
        document.body.classList.add('fonts-loaded');
      }, 300);
    </script>
