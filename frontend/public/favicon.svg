<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="favbg" cx="35%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#1a0f3a"/>
      <stop offset="100%" stop-color="#060610"/>
    </radialGradient>
    <linearGradient id="favsp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="favgl">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo con bordes redondeados -->
  <rect width="32" height="32" rx="7" fill="url(#favbg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="0.5"/>

  <!-- Glow blob -->
  <circle cx="16" cy="16" r="11" fill="#7c3aed" fill-opacity="0.20" filter="url(#favgl)"/>

  <!-- Sparkle principal -->
  <path d="M 16.00,6.50 L 16.87,15.13 L 25.50,16.00 L 16.87,16.87 L 16.00,25.50 L 15.13,16.87 L 6.50,16.00 L 15.13,15.13 Z" fill="url(#favsp)" filter="url(#favgl)"/>

  <!-- Punto de brillo central -->
  <path d="M 16.00,12.39 L 16.56,15.44 L 19.61,16.00 L 16.56,16.56 L 16.00,19.61 L 15.44,16.56 L 12.39,16.00 L 15.44,15.44 Z" fill="#ffffff" fill-opacity="0.95"/>
</svg>