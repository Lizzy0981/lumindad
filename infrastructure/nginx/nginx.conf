# ══════════════════════════════════════════════════════════════════════════════
# nginx.conf
# LumindAd · Ad Performance Intelligence Platform v1.0
# Author : Elizabeth Díaz Familia · AI Data Scientist · Sustainable Intelligence & BI
#
# Responsibilities:
#   · Serve React 18 SPA (Vite dist/) with correct cache headers
#   · Reverse proxy  /api/*  → backend FastAPI     :8000
#   · Reverse proxy  /ml/*   → ML inference        :8001
#   · SSE passthrough for upload progress (/api/v1/upload/progress/*)
#   · WebSocket upgrade support (real-time dashboard updates)
#   · Compression, security headers, rate limiting
#   · /health endpoint for k8s liveness + readiness probes
#
# Deployment context:
#   · Runs inside lumindad/frontend:1.0.0 Docker image (nginx:1.25-alpine)
#   · Non-root user (uid 1001) — paths must be writable by that uid
#   · In Kubernetes the Ingress controller handles TLS; nginx here is HTTP only
# ══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL CONTEXT
# ─────────────────────────────────────────────────────────────────────────────
worker_processes      auto;           # One worker per CPU core
worker_rlimit_nofile  65535;          # Max open file descriptors per worker

error_log  /var/log/nginx/error.log  warn;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;         # Linux kernel event model
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP CONTEXT
# ─────────────────────────────────────────────────────────────────────────────
http {

    # Non-root writable temp paths (uid 1001) — must be inside http {}
    client_body_temp_path  /tmp/client_body;
    proxy_temp_path        /tmp/proxy;
    fastcgi_temp_path      /tmp/fastcgi;
    uwsgi_temp_path        /tmp/uwsgi;
    scgi_temp_path         /tmp/scgi;

    # ── MIME types ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Additional types not in default mime.types
    types {
        application/manifest+json       webmanifest;
        application/javascript          mjs jsx;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct=$upstream_connect_time '
        'uht=$upstream_header_time urt=$upstream_response_time '
        'rid=$request_id';

    access_log  /var/log/nginx/access.log  main  buffer=16k  flush=5s;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;            # Batch TCP packets (works with sendfile)
    tcp_nodelay         on;            # Disable Nagle for keep-alive connections
    keepalive_timeout   65;
    keepalive_requests  1000;

    # ── Request / response sizing ─────────────────────────────────────────────
    client_max_body_size        100m;  # Supports large CSV/XLSX uploads
    client_body_buffer_size     128k;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;
    client_body_timeout         60s;
    client_header_timeout       10s;
    send_timeout                60s;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;             # Balance CPU vs size (1-9)
    gzip_min_length     1024;          # Skip compressing tiny responses
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security: hide nginx version ──────────────────────────────────────────
    server_tokens  off;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API: 60 req/min per IP (generous for dashboard SPA)
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m     rate=60r/m;
    # ML inference: 10 req/min (compute-heavy — SHAP + TF inference)
    limit_req_zone  $binary_remote_addr  zone=ml_limit:5m       rate=10r/m;
    # Auth endpoints: 10 req/min (brute-force protection)
    limit_req_zone  $binary_remote_addr  zone=auth_limit:5m     rate=10r/m;
    # Upload: 5 simultaneous per IP
    limit_conn_zone $binary_remote_addr  zone=upload_conn:5m;

    # ── Upstream: FastAPI backend (Kubernetes service) ────────────────────────
    upstream lumindad_backend {
        server  backend:8000;
        keepalive  32;                 # Persistent connections to backend
    }

    # ── Upstream: ML inference service ────────────────────────────────────────
    upstream lumindad_ml {
        server  ml:8001;
        keepalive  8;                  # Fewer - ML pods are heavy
    }

    # ── Map: WebSocket upgrade header ─────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default   upgrade;
        ''        close;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # SERVER BLOCK — LumindAd SPA + API proxy
    # ──────────────────────────────────────────────────────────────────────────
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;                # Matches any hostname (TLS handled by Ingress)

        root   /usr/share/nginx/html;
        index  index.html;

        # ── Request ID for tracing ─────────────────────────────────────────────
        add_header  X-Request-ID  $request_id  always;

        # ── Security headers ───────────────────────────────────────────────────
        add_header  X-Frame-Options           "DENY"                            always;
        add_header  X-Content-Type-Options    "nosniff"                         always;
        add_header  X-XSS-Protection          "1; mode=block"                   always;
        add_header  Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header  Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header  Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://lumindad.ai wss://lumindad.ai;" always;

        # ── LumindAd branding header ───────────────────────────────────────────
        add_header  X-LumindAd-Version  "1.0.0"              always;
        add_header  X-LumindAd-Author   "Elizabeth-Diaz-Familia" always;

        # ── Health check — k8s liveness + readiness probes ─────────────────────
        location = /health {
            access_log   off;
            add_header   Content-Type  "application/json";
            return 200   '{"status":"ok","service":"lumindad-frontend","version":"1.0.0"}';
        }

        # ── ML Inference API  /ml/* ────────────────────────────────────────────
        # Stricter rate limit; extended timeouts for SHAP computation
        location /ml/ {
            limit_req   zone=ml_limit  burst=5  nodelay;
            limit_req_status  429;

            proxy_pass          http://lumindad_ml/;
            proxy_http_version  1.1;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    X-Request-ID       $request_id;
            proxy_set_header    Connection         "";  # Disable hop-by-hop for upstream keepalive

            proxy_connect_timeout   10s;
            proxy_read_timeout      120s;   # SHAP TreeExplainer can take ~60s
            proxy_send_timeout      30s;

            proxy_buffering     on;
            proxy_buffer_size   16k;
            proxy_buffers       8 16k;

            # Green AI response header — backend adds CO₂ per inference
            add_header  X-LumindAd-GreenAI  "GHG-Scope2-enabled"  always;
        }

        # ── Backend REST API  /api/* ───────────────────────────────────────────
        location /api/ {
            limit_req   zone=api_limit  burst=20  nodelay;
            limit_req_status  429;

            proxy_pass          http://lumindad_backend/api/;
            proxy_http_version  1.1;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    X-Request-ID       $request_id;
            proxy_set_header    Connection         "";

            proxy_connect_timeout   10s;
            proxy_read_timeout      300s;   # Long-running CSV/XLSX processing
            proxy_send_timeout      60s;

            # Support large CSV/XLSX uploads
            client_max_body_size    100m;

            proxy_buffering     on;
            proxy_buffer_size   32k;
            proxy_buffers       8 32k;
            proxy_busy_buffers_size 64k;
        }

        # ── SSE: Upload progress stream  /api/v1/upload/progress/* ────────────
        # Server-Sent Events require buffering OFF and long timeouts
        location ~ ^/api/v1/upload/progress/ {
            limit_conn   upload_conn  5;

            proxy_pass          http://lumindad_backend;
            proxy_http_version  1.1;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    X-Request-ID       $request_id;
            proxy_set_header    Connection         "";

            # SSE requires buffering disabled — events must reach client immediately
            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      600s;   # 10min - large file processing
            proxy_send_timeout      600s;
            chunked_transfer_encoding on;

            # Tell browser this is an event stream
            add_header  Cache-Control    "no-cache"           always;
            add_header  Content-Type     "text/event-stream"  always;
            add_header  X-Accel-Buffering "no"               always;
        }

        # ── WebSocket  /ws/* ──────────────────────────────────────────────────
        # Real-time dashboard KPI updates
        location /ws/ {
            proxy_pass          http://lumindad_backend/ws/;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection $connection_upgrade;
            proxy_set_header    Host       $host;
            proxy_set_header    X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;     # Keep WS alive for 1h dashboard session
            proxy_send_timeout  3600s;
        }

        # ── Auth endpoints — brute-force protection ────────────────────────────
        location /api/v1/auth/ {
            limit_req   zone=auth_limit  burst=5  nodelay;
            limit_req_status  429;

            proxy_pass          http://lumindad_backend/api/v1/auth/;
            proxy_http_version  1.1;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    Connection         "";
            proxy_read_timeout  30s;
        }

        # ── FastAPI docs (available in non-production) ─────────────────────────
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass          http://lumindad_backend;
            proxy_http_version  1.1;
            proxy_set_header    Host    $host;
            proxy_set_header    Connection "";
            proxy_read_timeout  30s;
        }

        # ── Static assets — Vite build output ────────────────────────────────
        # /assets/ contains hashed filenames (e.g. index.Bx92kLp3.js)
        # Safe to cache aggressively since filenames change on every build
        location /assets/ {
            expires       1y;
            add_header    Cache-Control  "public, immutable, max-age=31536000";
            access_log    off;
            gzip_static   on;          # Serve pre-compressed .gz if present
        }

        # Manifest, service worker, favicon — short TTL (may update between deploys)
        location ~ ^/(manifest\.json|sw\.js|favicon\.ico|robots\.txt|sitemap\.xml)$ {
            expires       1d;
            add_header    Cache-Control  "public, max-age=86400";
            access_log    off;
        }

        # i18n locale files — short TTL (translations can change)
        location /locales/ {
            expires       1h;
            add_header    Cache-Control  "public, max-age=3600";
            access_log    off;
        }

        # ── React SPA catch-all ───────────────────────────────────────────────
        # Any path not matched above falls through to index.html
        # React Router handles client-side navigation from there
        location / {
            try_files  $uri  $uri/  /index.html;

            # index.html must NOT be cached (always fetch latest build)
            add_header  Cache-Control  "no-cache, no-store, must-revalidate";
            add_header  Pragma         "no-cache";
            add_header  Expires        "0";
        }

        # ── Error pages ───────────────────────────────────────────────────────
        error_page  404              /index.html;   # SPA handles 404
        error_page  429              @rate_limited;
        error_page  500 502 503 504  @server_error;

        location @rate_limited {
            add_header  Content-Type   "application/json"  always;
            add_header  Retry-After    "60"                always;
            return 429  '{"error":"too_many_requests","message":"Rate limit exceeded. Please wait 60s.","service":"lumindad"}';
        }

        location @server_error {
            add_header  Content-Type  "application/json"  always;
            return 503  '{"error":"service_unavailable","message":"LumindAd is temporarily unavailable. Please try again.","service":"lumindad"}';
        }
    }
}
