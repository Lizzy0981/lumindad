# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.prod.yml — Production Stack
# LumindAd · Ad Performance Intelligence Platform v1.0
# Author: Elizabeth Díaz Familia · AI Data Scientist · Sustainable Intelligence & BI
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml pull && docker-compose -f docker-compose.prod.yml up -d
#
# Notes:
#   - All secrets must be set in .env (never commit .env to git)
#   - Frontend container (nginx:1.25-alpine) handles reverse proxy on :80
#     nginx.conf is baked into the image (Dockerfile.frontend stage 3)
#     Proxies /api/* → backend:8000 and /ml/* → ml:8001
#   - Resource limits enforce production quotas
# ══════════════════════════════════════════════════════════════════════════════

name: lumindad-prod

x-backend-env: &backend-env
  DATABASE_URL:          ${DATABASE_URL}
  REDIS_URL:             ${REDIS_URL}
  CELERY_BROKER_URL:     ${REDIS_URL}/0
  CELERY_RESULT_BACKEND: ${REDIS_URL}/1
  SECRET_KEY:            ${SECRET_KEY}
  JWT_SECRET:            ${JWT_SECRET}
  APP_ENV:               production
  LOG_LEVEL:             info
  PYTHONUNBUFFERED:      "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONPATH:            /app
  MODEL_DIR:             /app/ml/models
  TF_CPP_MIN_LOG_LEVEL:  "3"
  GREEN_AI_ENABLED:      "true"
  ML_SERVICE_URL:        http://ml:8001
  WORKERS:               "4"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  MAX_UPLOAD_SIZE_MB:    "100"
  CHUNK_SIZE:            "50000"

x-healthcheck-prod: &hc-prod
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Frontend — nginx static server + reverse proxy ──────────────────────────
  # Serves React 18 SPA on :80 and proxies /api/* → backend, /ml/* → ml
  # nginx.conf is baked into the image at build time (Dockerfile.frontend stage 3)
  # Non-root user (uid 1001) — pid and temp paths set to /tmp in nginx.conf
  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    container_name: lumindad_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      VITE_API_URL:         ${VITE_API_URL:-http://138.197.104.81/api}
      VITE_ML_URL:          ${VITE_ML_URL:-http://138.197.104.81/ml}
      VITE_APP_VERSION:     "1.0.0"
      VITE_APP_ENV:         production
      VITE_ENABLE_GREEN_AI: "true"
    depends_on:
      - backend
      - ml
    healthcheck:
      <<: *hc-prod
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 128M
    logging: *logging
    networks:
      - lumindad_prod_net

  # ── Backend — FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: lumindad_backend
    restart: always
    command: ["/entrypoint.sh", "api"]
    expose:
      - "8000"
    volumes:
      - uploads_prod:/app/uploads
      - ml_models_prod:/app/ml/models:ro
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      <<: *hc-prod
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 1G
        reservations:
          cpus: "0.05"
          memory: 256M
    logging: *logging
    networks:
      - lumindad_prod_net

  # ── ML Inference ─────────────────────────────────────────────────────────────
  ml:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.ml
    container_name: lumindad_ml
    restart: always
    expose:
      - "8001"
    volumes:
      - ml_models_prod:/app/models:ro
    environment:
      ML_PORT:              "8001"
      DEFAULT_MODEL:        XGBoost
      GREEN_AI_ENABLED:     "true"
      GREEN_AI_CPU_W:       "95"
      GREEN_AI_PUE:         "1.57"
      GREEN_AI_CARBON_INTENSITY: "0.475"
      TF_CPP_MIN_LOG_LEVEL: "3"
      LOG_LEVEL:            info
    healthcheck:
      <<: *hc-prod
      test: ["CMD", "curl", "-fs", "http://localhost:8001/health"]
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 2G
        reservations:
          cpus: "0.05"
          memory: 512M
    logging: *logging
    networks:
      - lumindad_prod_net

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: lumindad_worker
    restart: always
    command: ["/entrypoint.sh", "worker"]
    volumes:
      - uploads_prod:/app/uploads
      - ml_models_prod:/app/ml/models:ro
    environment:
      <<: *backend-env
      CELERY_CONCURRENCY: "4"
      CELERY_LOGLEVEL:    info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M
    logging: *logging
    networks:
      - lumindad_prod_net

  # ── PostgreSQL 15 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lumindad_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lumindad}
      POSTGRES_USER:     ${POSTGRES_USER:-lumindad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      <<: *hc-prod
      test: ["CMD", "pg_isready", "-U", "lumindad", "-d", "lumindad"]
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 512M
        reservations:
          cpus: "0.05"
          memory: 128M
    logging: *logging
    networks:
      - lumindad_prod_net

  # ── Redis 7.2 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: lumindad_redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    volumes:
      - redis_prod:/data
    healthcheck:
      <<: *hc-prod
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 256M
    logging: *logging
    networks:
      - lumindad_prod_net

volumes:
  postgres_prod:  { driver: local }
  redis_prod:     { driver: local }
  uploads_prod:   { driver: local }
  ml_models_prod: { driver: local }

networks:
  lumindad_prod_net:
    driver: bridge
    name: lumindad_production
