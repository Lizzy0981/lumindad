# backend/alembic.ini
# ─────────────────────────────────────────────────────────────
# LumindAd Enterprise · Alembic configuration
# ─────────────────────────────────────────────────────────────
#
# Usage (run from backend/):
#   alembic upgrade head           # apply all migrations
#   alembic downgrade -1           # roll back one step
#   alembic revision --autogenerate -m "add_X"  # generate new migration
#   alembic history --verbose      # show migration history
#   alembic current                # show current revision
#   alembic show <rev>             # show a specific revision
#
# Environment override (skip alembic.ini URL):
#   export DATABASE_URL=postgresql+asyncpg://user:pass@host/db
#   alembic upgrade head

[alembic]
script_location = %(here)s/migrations
file_template   = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
path_separator  = os
truncate_slug_length = 40

# Default sync URL — overridden by env.py reading settings.DATABASE_URL_SYNC
# Uses psycopg2 (sync) for Alembic; asyncpg is used at runtime.
sqlalchemy.url  = postgresql://lumindad:lumindad@localhost:5432/lumindad

[post_write_hooks]
# Format new revision files with ruff if available
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level     = WARNING
handlers  = console
qualname  =

[logger_sqlalchemy]
level    = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level    = INFO
handlers =
qualname = alembic

[handler_console]
class     = StreamHandler
args      = (sys.stderr,)
level     = NOTSET
formatter = generic

[formatter_generic]
format   = %(levelname)-5.5s [%(name)s] %(message)s
datefmt  = %H:%M:%S