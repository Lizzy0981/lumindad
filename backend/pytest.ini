# backend/pytest.ini
[pytest]
# ─────────────────────────────────────────────────────────────
# LumindAd Enterprise · pytest configuration
# ─────────────────────────────────────────────────────────────
#
# Run all tests:
#   cd backend && pytest
#
# Run only unit tests:
#   pytest tests/unit/
#
# Run only integration tests:
#   pytest tests/integration/
#
# Run with coverage:
#   pytest --cov=app --cov=ml --cov-report=term-missing
#
# Run a single test file:
#   pytest tests/unit/test_security.py -v
#
# Run a specific test class / method:
#   pytest tests/unit/test_security.py::TestAccessToken::test_decode_returns_correct_sub -v

asyncio_mode = auto

testpaths =
    tests

python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ───────────────────────────────────────────────────
markers =
    unit:         Unit tests — isolated, no live services
    integration:  Integration tests — full HTTP round-trips
    slow:         Tests taking > 2 seconds (ML warm-up etc.)
    auth:         Authentication-related tests
    ml:           Machine learning inference tests
    db:           Tests requiring a live database connection

# ── Warnings filters ──────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning:tensorflow.*
    ignore::DeprecationWarning:keras.*
    ignore::UserWarning:tensorflow.*
    ignore::FutureWarning:xgboost.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::PendingDeprecationWarning

# ── Log level during tests ────────────────────────────────────
log_cli       = false
log_level     = WARNING

# ── Minimum version ──────────────────────────────────────────
minversion = 7.0